# OAuth 2 Gateway Configuration
# Available modes: TOKEN_FORWARD (default), RBAC
quarkus.littlehorse.gateway.oauth2.mode=TOKEN_FORWARD

# OIDC Configuration (required for RBAC mode)
# Override these properties when using RBAC mode
quarkus.oidc.auth-server-url=http://localhost:8888/realms/lh-gateway
quarkus.oidc.client-id=lh-gateway
quarkus.oidc.credentials.secret=lh-gateway-secret

# In TOKEN_FORWARD mode, OIDC is not needed and security annotations are bypassed
quarkus.oidc.enabled=false
quarkus.http.auth.proactive=false
quarkus.http.auth.permission."permit-all".paths=/*
quarkus.http.auth.permission."permit-all".policy=permit

# RBAC role names (configurable, used in @RolesAllowed annotations)
quarkus.littlehorse.gateway.oauth2.rbac.admin-role=gateway-admin
quarkus.littlehorse.gateway.oauth2.rbac.reader-role=gateway-reader

# --- RBAC mode configuration ---
# To enable RBAC mode, set the following properties:
# quarkus.littlehorse.gateway.oauth2.mode=RBAC
# quarkus.oidc.enabled=true
# quarkus.http.auth.proactive=true
# quarkus.http.auth.permission."permit-all".paths=
# quarkus.http.auth.permission."permit-all".policy=
#
# Roles:
#   - admin-role: full access (read + write, all endpoints)
#   - reader-role: read-only access (GET endpoints only)
