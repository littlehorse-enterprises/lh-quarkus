# Bag metadata
quarkus.littlehorse.saddle.bag.name=example-saddle-bag
quarkus.littlehorse.saddle.bag.title=Example Saddle Bag
quarkus.littlehorse.saddle.bag.author=LittleHorse
quarkus.littlehorse.saddle.bag.description=An example saddle bag showcasing tasks with primitives, strings, structs, and type adapters
quarkus.littlehorse.saddle.bag.metadata.tags=test,example
quarkus.littlehorse.saddle.bag.metadata.licence=MIT
quarkus.littlehorse.saddle.bag.metadata.documentation-url=https://example.com/docs/saddle-bag
quarkus.littlehorse.saddle.bag.metadata.icon-url=https://example.com/icons/saddle-bag.png
quarkus.littlehorse.saddle.bag.metadata.support-email=support@littlehorse.io

# Output configuration
quarkus.littlehorse.saddle.bag.output.format=json

# Task names
task.add-numbers.name=add-numbers
task.is-eligible.name=is-eligible
task.greet.name=greet
task.format-full-name.name=format-full-name
task.validate-order.name=validate-order
task.ship-order.name=ship-order
task.generate-tracking-id.name=generate-tracking-id
task.lookup-tracking.name=lookup-tracking
task.send-notification.name=send-notification

# Struct names
struct.order.name=order
struct.shipping-address.name=shipping-address

# Disable struct registration
quarkus.littlehorse.structs.register.enabled=false

# Disable struct-related tasks
quarkus.littlehorse.tasks.validate-order.register.enabled=false
quarkus.littlehorse.tasks.validate-order.start.enabled=false
quarkus.littlehorse.tasks.ship-order.register.enabled=false
quarkus.littlehorse.tasks.ship-order.start.enabled=false
